global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fraud-service
    static_configs:
      - targets: ["fraud-service:8001"]
    metrics_path: /metrics

  - job_name: llm-service
    static_configs:
      - targets: ["llm-service:8002"]
    metrics_path: /metrics

  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics
